services:
  homepage:
    build:
      context: ./homepage-data
      dockerfile: Dockerfile.homepage
    container_name: theodor-litt-homepage
    ports:
      - "3000:3000"
    volumes:
      # SSH-Keys für Zugriff auf Remote-Server
      - ${USERPROFILE}/.ssh:/tmp/host-ssh:ro
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-theodor-litt-secret-change-in-production}
      - PYTHONUNBUFFERED=1
      - SSH_REMOTE_HOST=${SSH_REMOTE_HOST:-100.66.170.64}
      - SSH_REMOTE_USER=${SSH_REMOTE_USER:-dataserver}
      - SSH_REMOTE_PATH=${SSH_REMOTE_PATH:-/srv/schuler-daten}
    networks:
      - devnet

networks:
  devnet:
    driver: bridge