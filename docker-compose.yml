services:
  homepage:
    build:
      context: ./homepage-data
      dockerfile: Dockerfile.homepage
    container_name: dockerlab-homepage
    ports:
      - "3000:3000"
    volumes:
      # Docker-Socket für Container-Verwaltung
      - /var/run/docker.sock:/var/run/docker.sock
      # Lokales Daten-Verzeichnis
      - ./data:/data
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-dockerlab-secret-key}
      - PYTHONUNBUFFERED=1
      # Nextcloud-Konfiguration (optional)
      - NEXTCLOUD_URL=${NEXTCLOUD_URL:-}
      - NEXTCLOUD_USERNAME=${NEXTCLOUD_USERNAME:-}
      - NEXTCLOUD_PASSWORD=${NEXTCLOUD_PASSWORD:-}
      - NEXTCLOUD_PATH=${NEXTCLOUD_PATH:-/DockerLab}
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://localhost:3000')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - devnet

networks:
  devnet:
    driver: bridge
